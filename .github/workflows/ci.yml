name: MLOps Pipeline

on:
  push:
    branches: [ "feature/*", "develop" ]

jobs:
  # Étape 1 : Entraînement (pour tout le monde)
  train-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11" 
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Train Model
        run: |
          python scripts/train.py

  # Étape 2 : Construction et Publication Docker (Uniquement sur develop)
  build-and-push:
    needs: train-and-test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push Docker image
        run: |
          # Utilisation de ton nom d'utilisateur Docker Hub dynamiquement
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mobile-api:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mobile-api:latest